# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.contact_recipient_email: '%env(string:CONTACT_RECIPIENT_EMAIL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    Symfony\Component\HttpFoundation\UriSigner:
        arguments:
            $secret: '%kernel.secret%'

    App\Contract\UserByEmailFinderInterface: '@App\Repository\UserEntityRepository'
    App\Contract\TranslationCatalogReaderInterface: '@App\Catalog\Infrastructure\Translation\TranslationCatalogReader'
    App\Contract\TranslationCatalogWriterInterface: '@App\Catalog\Infrastructure\Translation\TranslationCatalogWriter'
    App\Catalog\Application\Import\ItemImportSourceReaderInterface: '@App\Catalog\Infrastructure\Import\FilesystemItemImportSourceReader'
    App\Catalog\Application\Import\ItemImportPersistenceInterface: '@App\Catalog\Infrastructure\Import\DoctrineItemImportPersistence'
    App\Identity\Application\VerifyEmail\VerifyEmailUserRepositoryInterface: '@App\Repository\UserEntityRepository'
    App\Identity\Application\ResetPassword\ResetPasswordUserRepositoryInterface: '@App\Repository\UserEntityRepository'
    App\Identity\Application\ForgotPassword\ForgotPasswordUserRepositoryInterface: '@App\Repository\UserEntityRepository'
    App\Identity\Application\Registration\RegistrationUserRepositoryInterface: '@App\Repository\UserEntityRepository'
    App\Identity\Application\ResendVerification\ResendVerificationUserRepositoryInterface: '@App\Repository\UserEntityRepository'
    App\Identity\Application\Notification\IdentityLinkEmailSenderInterface: '@App\Identity\Infrastructure\Notification\IdentityLinkEmailSender'
    App\Identity\Application\Notification\IdentitySignedLinkGeneratorInterface: '@App\Identity\Infrastructure\Notification\IdentitySignedLinkGenerator'
    App\Identity\Application\Guard\IdentityRequestGuardInterface: '@App\Identity\Infrastructure\Guard\IdentityRequestGuard'
    App\Identity\Application\Guard\IdentityCaptchaVerifierInterface: '@App\Identity\Infrastructure\Guard\TurnstileIdentityCaptchaVerifier'
    App\Identity\Application\Guard\IdentityRateLimiterInterface: '@App\Identity\Infrastructure\Guard\AuthRequestThrottlerRateLimiter'
    App\Identity\Application\Time\IdentityClockInterface: '@App\Identity\Infrastructure\Time\SystemIdentityClock'
    App\Identity\Application\Common\IdentityWritePersistenceInterface: '@App\Identity\Infrastructure\Persistence\DoctrineIdentityWritePersistence'
    App\Identity\Application\Common\IdentityPasswordHasherInterface: '@App\Identity\Infrastructure\Security\SymfonyIdentityPasswordHasher'
    App\Support\Application\Contact\ContactMessageEmailSenderInterface: '@App\Support\Infrastructure\Contact\ContactMessageEmailSender'

    App\Service\TurnstileVerifier:
        arguments:
            $siteKey: '%env(string:TURNSTILE_SITE_KEY)%'
            $secretKey: '%env(string:TURNSTILE_SECRET_KEY)%'

    App\Support\Infrastructure\Contact\ContactMessageEmailSender:
        arguments:
            $contactRecipientEmail: '%app.contact_recipient_email%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
