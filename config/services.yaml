# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.contact_recipient_email: '%env(string:CONTACT_RECIPIENT_EMAIL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    Symfony\Component\HttpFoundation\UriSigner:
        arguments:
            $secret: '%kernel.secret%'

    App\Identity\Application\User\UserByEmailFinder: '@App\Identity\Infrastructure\Persistence\UserEntityRepository'
    App\Catalog\Application\Translation\TranslationCatalogReader: '@App\Catalog\Infrastructure\Translation\TranslationCatalogReader'
    App\Catalog\Application\Translation\TranslationCatalogWriter: '@App\Catalog\Infrastructure\Translation\TranslationCatalogWriter'
    App\Catalog\Application\Minerva\MinervaRotationRegenerationRepository: '@App\Catalog\Infrastructure\Persistence\MinervaRotationEntityRepository'
    App\Catalog\Application\Import\ItemImportSourceReaderInterface: '@App\Catalog\Infrastructure\Import\FilesystemItemImportSourceReader'
    App\Catalog\Application\Import\ItemImportPersistenceInterface: '@App\Catalog\Infrastructure\Import\DoctrineItemImportPersistence'
    App\Identity\Application\VerifyEmail\VerifyEmailUserRepository: '@App\Identity\Infrastructure\Persistence\UserEntityRepository'
    App\Identity\Application\ResetPassword\ResetPasswordUserRepository: '@App\Identity\Infrastructure\Persistence\UserEntityRepository'
    App\Identity\Application\ForgotPassword\ForgotPasswordUserRepository: '@App\Identity\Infrastructure\Persistence\UserEntityRepository'
    App\Identity\Application\Registration\RegistrationUserRepository: '@App\Identity\Infrastructure\Persistence\UserEntityRepository'
    App\Identity\Application\ResendVerification\ResendVerificationUserRepository: '@App\Identity\Infrastructure\Persistence\UserEntityRepository'
    App\Identity\Application\Oidc\GoogleOidcIdentityReadRepository: '@App\Identity\Infrastructure\Persistence\UserIdentityEntityRepository'
    App\Identity\Application\Oidc\GoogleOidcIdentityWriteRepository: '@App\Identity\Infrastructure\Persistence\UserIdentityEntityRepository'
    App\Identity\Application\Oidc\GoogleOidcConfig: '@App\Identity\Infrastructure\Oidc\GoogleOidcConfigProvider'
    App\Identity\Application\Oidc\GoogleOidcClient: '@App\Identity\Infrastructure\Oidc\GoogleOidcHttpClient'
    App\Identity\Application\Notification\IdentityLinkEmailSender: '@App\Identity\Infrastructure\Notification\IdentityLinkEmailSender'
    App\Identity\Application\Notification\IdentitySignedLinkGenerator: '@App\Identity\Infrastructure\Notification\IdentitySignedLinkGenerator'
    App\Identity\Application\Guard\IdentityRequestGuard: '@App\Identity\Infrastructure\Guard\IdentityRequestGuard'
    App\Identity\Application\Guard\IdentityCaptchaVerifier: '@App\Identity\Infrastructure\Guard\TurnstileIdentityCaptchaVerifier'
    App\Identity\Application\Guard\IdentityCaptchaSiteKeyProvider: '@App\Identity\Infrastructure\Guard\TurnstileVerifier'
    App\Identity\Application\Guard\IdentityRateLimiter: '@App\Identity\Infrastructure\Guard\AuthRequestThrottlerRateLimiter'
    App\Identity\Application\Time\IdentityClock: '@App\Identity\Infrastructure\Time\SystemIdentityClock'
    App\Identity\Application\Common\IdentityWritePersistence: '@App\Identity\Infrastructure\Persistence\DoctrineIdentityWritePersistence'
    App\Identity\Application\Common\IdentityPasswordHasher: '@App\Identity\Infrastructure\Security\SymfonyIdentityPasswordHasher'
    App\Identity\Application\Security\ActiveUserSessionRegistry: '@App\Identity\Infrastructure\Security\CacheActiveUserSessionRegistry'
    App\Identity\Application\Security\AuthAuditLogWriter: '@App\Identity\Infrastructure\Persistence\DoctrineAuthAuditLogWriter'
    App\Identity\Application\Security\AuthAuditLogReader: '@App\Identity\Infrastructure\Persistence\AuthAuditLogEntityRepository'
    App\Support\Application\Audit\AuditLogReadRepository: '@App\Support\Infrastructure\Persistence\AdminAuditLogEntityRepository'
    App\Support\Application\AdminUser\AdminUserManagementReadRepository: '@App\Identity\Infrastructure\Persistence\UserEntityRepository'
    App\Support\Application\Contact\ContactMessageEmailSender: '@App\Support\Infrastructure\Contact\ContactMessageEmailSender'
    App\Support\Application\Contact\ContactMessageReadRepository: '@App\Support\Infrastructure\Persistence\ContactMessageEntityRepository'
    App\Support\Application\Contact\ContactMessageStatusWriteRepository: '@App\Support\Infrastructure\Persistence\ContactMessageEntityRepository'

    App\Identity\Infrastructure\Guard\TurnstileVerifier:
        arguments:
            $siteKey: '%env(string:TURNSTILE_SITE_KEY)%'
            $secretKey: '%env(string:TURNSTILE_SECRET_KEY)%'

    App\Identity\Infrastructure\Oidc\GoogleOidcConfigProvider:
        arguments:
            $enabled: '%env(bool:OIDC_GOOGLE_ENABLED)%'
            $issuer: '%env(string:OIDC_GOOGLE_ISSUER)%'
            $clientId: '%env(string:OIDC_GOOGLE_CLIENT_ID)%'
            $clientSecret: '%env(string:OIDC_GOOGLE_CLIENT_SECRET)%'

    App\Support\Infrastructure\Contact\ContactMessageEmailSender:
        arguments:
            $contactRecipientEmail: '%app.contact_recipient_email%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
