services:
  app:
    build:
      context: .
      target: dev
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: "postgresql://app:!ChangeMe!@database:5432/app?serverVersion=16&charset=utf8"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./:/var/www/html:rw
      - symfony_var:/var/www/html/var
    command: >
      sh -lc "mkdir -p var/log var/cache var/sessions
      && chown -R www-data:www-data var
      && chmod -R ug+rwX var
      && composer install --prefer-dist --no-interaction --no-progress
      && php-fpm"

  web:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_PASSWORD: "!ChangeMe!"
      POSTGRES_USER: app
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d app -U app"]
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "8025:8025"

volumes:
  database_data:
  symfony_var:
