services:
  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: "${APP_SECRET:?set APP_SECRET}"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:?set TRUSTED_PROXIES}"
      SECURITY_CSP_MODE: "${SECURITY_CSP_MODE:-enforce}"
      TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"
      OIDC_GOOGLE_ENABLED: "${OIDC_GOOGLE_ENABLED:-0}"
      OIDC_GOOGLE_ISSUER: "${OIDC_GOOGLE_ISSUER:-https://accounts.google.com}"
      OIDC_GOOGLE_CLIENT_ID: "${OIDC_GOOGLE_CLIENT_ID:-}"
      OIDC_GOOGLE_CLIENT_SECRET: "${OIDC_GOOGLE_CLIENT_SECRET:-}"
      MAILER_DSN: "${MAILER_DSN:?set MAILER_DSN}"
      CONTACT_RECIPIENT_EMAIL: "${CONTACT_RECIPIENT_EMAIL:?set CONTACT_RECIPIENT_EMAIL}"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/var/www/html:ro
      - symfony_var:/var/www/html/var
    command: >
      sh -lc "mkdir -p var/log var/cache var/sessions
      && chown -R www-data:www-data var
      && chmod -R ug+rwX var
      && php-fpm -F"

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-app}"
      POSTGRES_USER: "${POSTGRES_USER:-app}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-app} -U ${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data

volumes:
  database_data:
  redis_data:
  symfony_var:
